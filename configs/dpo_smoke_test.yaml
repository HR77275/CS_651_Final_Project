experiment:
  name: dpo_smoke_test
  output_dir: outputs/
  seed: 42

data:
  dataset_name: argilla/ultrafeedback-binarized-preferences-cleaned
  tokenizer_name: Qwen/Qwen2.5-0.5B
  max_prompt_length: 64
  max_response_length: 64
  batch_size: 1
  num_workers: 0
  max_train_samples: 10
  max_val_samples: 10

model:
  model_name: Qwen/Qwen2.5-0.5B
  use_lora: true
  lora_r: 4
  lora_alpha: 8
  lora_dropout: 0.0
  lora_target_modules: ["q_proj", "v_proj"]
  load_in_4bit: false
  torch_dtype: float32

optimizer:
  name: adamw
  lr: 5.0e-5
  weight_decay: 0.01
  betas: [0.9, 0.999]

training:
  epochs: 1
  device: cpu
  beta: 0.1
  use_amp: false
  track_grad_norm: true
  grad_norm_type: 2.0
  zero_grad_set_to_none: true
  max_train_batches: 2
  max_val_batches: 2
